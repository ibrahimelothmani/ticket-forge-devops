name: Ticket Service Production AWS CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ticket-service/**'

# تفعيل الصلاحيات اللازمة لعمل الـ OIDC Authentication مع AWS بأمان
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  # ضع هنا الـ ARN الخاص بالـ IAM Role الذي تم إنشاؤه في AWS لـ GitHub OIDC
  AWS_ROLE_TO_ASSUME: arn:aws:iam::123456789012:role/github-actions-ecr-role
  ECR_REPOSITORY: ticketforge/ticket-service

jobs:
  build-scan-push-to-aws:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ticket-service

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 3. Build with Maven
      run: mvn clean package -DskipTests

    # --- بداية سحر الـ AWS Cloud Connection ---
    
    - name: 4. Configure AWS Credentials (via OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: 5. Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: 6. Build and Tag Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest .
        # تصدير اسم الصورة الكامل للخطوة القادمة (الفحص الأمني)
        echo "FULL_IMAGE_NAME=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_ENV

    - name: 7. Trivy Security Scan (Local Check)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.FULL_IMAGE_NAME }}
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: 8. Push Secure Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest