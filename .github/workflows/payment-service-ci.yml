name: Payment Service DevSecOps CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'payment-service/**' # يشتغل فقط إذا لمسنا كود الدفع
  pull_request:
    branches: [ "master" ]
    paths:
      - 'payment-service/**'

env:
  # وضعنا اسم شركتك Future Eagle IoT كـ Namespace في DockerHub
  IMAGE_NAME: future-eagle-iot/payment-service 
  TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./payment-service

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 3. Install Dependencies & Lint
      run: |
        pip install -r requirements.txt
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: 4. Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 5. Build Image locally for Scanning
      uses: docker/build-push-action@v5
      with:
        context: ./payment-service
        load: true
        tags: ${{ env.IMAGE_NAME }}:${{ env.TAG }}

    - name: 6. Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.IMAGE_NAME }}:${{ env.TAG }}'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: 7. Login to Docker Hub
      if: success()
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 8. Push to Docker Hub
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: ./payment-service
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ env.TAG }}
          ${{ env.IMAGE_NAME }}:latest