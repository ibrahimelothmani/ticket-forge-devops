---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: future-eagle-prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      # سحب البيانات من خدمات الجافا
      - job_name: 'spring-boot-services'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['ticket-service:8081', 'api-gateway-service:8000']

      # سحب البيانات من خدمات بايثون
      - job_name: 'fastapi-services'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['payment-service:8082', 'notification-service:8083']

---
# 2. Deployment لإطلاق سيرفر Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  namespace: future-eagle-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-server
  template:
    metadata:
      labels:
        app: prometheus-server
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus/"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: storage-volume
              mountPath: /prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-server-conf
        - name: storage-volume
          emptyDir: {}

---
# 3. Service لفتح بورت الـ Prometheus الـمراقبة
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: future-eagle-prod
spec:
  selector:
    app: prometheus-server
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP