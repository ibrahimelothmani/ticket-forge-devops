name: Ticket Service DevSecOps CI

# متى يشتغل هذا الـ Pipeline؟
on:
  push:
    branches: [ "main" ]
    # هذه النقطة مهمة جداً في الـ Monorepo:
    # الـ Pipeline يشتغل فقط إذا صار تعديل داخل مجلد ticket-service
    paths:
      - 'ticket-service/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ticket-service/**'

env:
  # اسم الصورة التي سيتم رفعها لـ Docker Hub (غيّر ibrahim-devops باسم حسابك في DockerHub)
  IMAGE_NAME: ibrahim-devops/ticket-service
  # استعمال الـ Commit Hash كـ Tag للحاوية لتسهيل تتبع الإصدارات
  TAG: ${{ github.sha }}

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    
    # تحديد مسار العمل الافتراضي لهذا الـ Job
    defaults:
      run:
        working-directory: ./ticket-service

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # لتسريع عملية البناء في المرات القادمة

    - name: 3. Run Maven Tests & Build
      run: mvn clean package -DskipTests # في بيئة حقيقية نحذف skipTests لضمان مرور الـ Unit Tests

    - name: 4. Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 5. Build Docker Image (Local Load)
      uses: docker/build-push-action@v5
      with:
        context: ./ticket-service
        load: true # نحتفظ بالصورة محلياً لغرض الفحص الأمني قبل الرفع
        tags: ${{ env.IMAGE_NAME }}:${{ env.TAG }}

    - name: 6. Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.IMAGE_NAME }}:${{ env.TAG }}'
        format: 'table'
        exit-code: '1' # إفشال الـ Pipeline فوراً إذا تم إيجاد ثغرات
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: 7. Login to Docker Hub
      if: success() # لا يتم تسجيل الدخول إلا إذا نجح فحص Trivy
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 8. Push Secure Image to Docker Hub
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: ./ticket-service
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ env.TAG }}
          ${{ env.IMAGE_NAME }}:latest