---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  namespace: future-eagle-prod
spec:
  replicas: 1 # يمكن زيادتها حسب ضغط كافكا
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: future-eagle-iot/notification-service:latest
        ports:
        - containerPort: 8083
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"