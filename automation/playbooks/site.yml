---
- name: Prepare Infrastructure Nodes for TicketForge High Load
  hosts: tag_Environment_production # استهداف سيرفرات الإنتاج ديناميكياً
  become: true
  gather_facts: true

  tasks:
    - name: Ensure baseline system security packages are up-to-date
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Optimize Linux Kernel for High TCP Concurrency (Tuning OS)
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      with_items:
        - { key: 'net.core.somaxconn', value: '1024' } # زيادة طابور الاتصالات المنتظرة
        - { key: 'net.ipv4.tcp_max_syn_backlog', value: '2048' }
        - { key: 'fs.file-max', value: '2097152' } # رفع حد الملفات المفتوحة للـ Microservices

    - name: Ensure Docker Engine is running safely
      systemd:
        name: docker
        state: started
        enabled: yes