name: API Gateway CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apigateway/**'

env:
  IMAGE_NAME: future-eagle-iot/api-gateway
  TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apigateway

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 3. Build with Maven
      run: mvn clean package -DskipTests

    - name: 4. Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 5. Build Image locally for Scanning
      uses: docker/build-push-action@v5
      with:
        context: ./apigateway
        load: true
        tags: ${{ env.IMAGE_NAME }}:${{ env.TAG }}

    - name: 6. Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.IMAGE_NAME }}:${{ env.TAG }}'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: 7. Login to Docker Hub
      if: success()
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 8. Push to Docker Hub
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: ./apigateway
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ env.TAG }}
          ${{ env.IMAGE_NAME }}:latest
